name: python-quality

on:
  push:
    paths:
      - "src/**/*.py"
      - "pyproject.toml"
      - ".github/workflows/python-quality.yml"
  pull_request:
    paths:
      - "src/**/*.py"
      - "pyproject.toml"
      - ".github/workflows/python-quality.yml"

jobs:
  ruff-ratchet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: python -m pip install "ruff>=0.9.0,<1"

      - name: Enforce cleaned ruff rule families
        run: ruff check src/ --select UP015
