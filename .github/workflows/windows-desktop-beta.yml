name: Windows desktop beta

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-beta:
    name: Build unsigned Windows x64 beta
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/spark_cli/web/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src/spark_cli/web/src-tauri

      - name: Install Spark and build dependencies
        run: python -m pip install -e ".[web,pty,messaging,dev]"

      - name: Build unsigned Windows beta
        shell: pwsh
        run: ./scripts/build_desktop_windows.ps1

      - name: Read desktop version
        id: version
        shell: pwsh
        run: |
          $config = Get-Content src/spark_cli/web/src-tauri/tauri.conf.json | ConvertFrom-Json
          "version=$($config.version)" >> $env:GITHUB_OUTPUT

      - name: Upload Windows beta installer
        uses: actions/upload-artifact@v4
        with:
          name: Spark-Windows-Beta-${{ steps.version.outputs.version }}-x64-unsigned
          path: src/spark_cli/web/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30
